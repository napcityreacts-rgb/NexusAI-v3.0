name: NexusAI CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compile-android:
    name: Compile Android Sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Compile debug Java sources
        run: |
          cd android
          chmod +x gradlew || true
          ./gradlew compileDebugJavaWithJavac --stacktrace
      - name: Run Android Lint
        run: |
          cd android
          ./gradlew lint --stacktrace || true
          if [ -f app/build/reports/lint-results-debug.html ]; then
            echo "Lint report generated"
          fi
      - name: Verify APK can be built
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace
          APK=$(find app/build/outputs/apk/debug/ -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found"
            exit 1
          fi
          echo "APK built: $APK"

  security-scan:
    name: Security & Quality Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded secrets in Android sources
        run: |
          echo "Scanning Android Java sources for potential secrets..."
          if grep -ri "password" android/app/src/main/java/ 2>/dev/null; then
            echo "WARNING: Possible hardcoded password found"
          else
            echo "No hardcoded passwords found"
          fi
          if grep -ri "api.key" android/app/src/main/java/ 2>/dev/null; then
            echo "WARNING: Possible hardcoded API key found"
          else
            echo "No hardcoded API keys found"
          fi
      - name: Source line count
        run: |
          LINES=$(find android/app/src/main/java/ -name "*.java" -exec cat {} + | wc -l)
          echo "Total Java source lines: $LINES"
          FILES=$(find android/app/src/main/java/ -name "*.java" | wc -l)
          echo "Total Java files: $FILES"
      - name: Verify all required Activity classes exist
        run: |
          echo "Verifying all Activity classes are present..."
          BASE="android/app/src/main/java/com/domwood/nexusai"
          for CLASS in MainActivity ChatActivity NeuralActivity NotesActivity NoteEditorActivity SettingsActivity NexusApp; do
            if [ -f "${BASE}/${CLASS}.java" ]; then
              echo "  OK ${CLASS}.java"
            else
              echo "  FAIL ${CLASS}.java MISSING"
              exit 1
            fi
          done
      - name: Verify all layout XML files exist
        run: |
          echo "Verifying all layout files are present..."
          BASE="android/app/src/main/res/layout"
          for LAYOUT in activity_main activity_chat activity_neural activity_notes activity_note_editor activity_settings item_chat_message item_note; do
            if [ -f "${BASE}/${LAYOUT}.xml" ]; then
              echo "  OK ${LAYOUT}.xml"
            else
              echo "  FAIL ${LAYOUT}.xml MISSING"
              exit 1
            fi
          done
